[workspace]
resolver = "2"
members = [
  "crates/nxr-cli",
  "crates/nxr-core",
  "crates/nxr-nix",
  "crates/nxr-process",
  "crates/nxr-workspace",
  "crates/nxr-completion",
  "crates/nxr-task",
  "crates/nxr-watch",
  "xtask",
]
default-members = ["crates/nxr-cli"]

[workspace.package]
version = "0.0.0"
edition = "2024"
rust-version = "1.91"
license = "MIT"
publish = false

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
